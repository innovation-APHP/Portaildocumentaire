# ============================================================================
# docker-compose.yml - Portail Documentaire Wiki.js
# Configuration complète pour déploiement production
# ============================================================================

version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════
# SERVICES
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Portail Documentaire (Application principale)
  # ─────────────────────────────────────────────────────────────────────────
  portail-docs:
    container_name: portail-documentaire
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: portail-documentaire:1.0.0
    restart: unless-stopped
    
    # Ports exposés
    ports:
      - "8080:80"  # Change 8080 par le port de ton choix
    
    # Variables d'environnement (optionnelles)
    environment:
      # URL de Wiki.js (optionnel, peut être configuré via l'interface)
      - VITE_WIKIJS_URL=${WIKIJS_URL:-http://wikijs:3000}
      
      # Token Wiki.js (optionnel, peut être configuré via l'interface)
      # ⚠️ Pour la production, utilise Docker secrets (voir section ci-dessous)
      - VITE_WIKIJS_TOKEN=${WIKIJS_TOKEN:-}
      
      # URL de l'API RAG (optionnel)
      - VITE_RAG_API_URL=${RAG_API_URL:-}
      
      # Timezone
      - TZ=Europe/Paris
    
    # Volumes pour persistance (optionnel)
    volumes:
      # Logs nginx
      - ./logs/nginx:/var/log/nginx
      
      # Configuration personnalisée (optionnel)
      # - ./docker/nginx-custom.conf:/etc/nginx/conf.d/default.conf:ro
    
    # Réseaux
    networks:
      - portail-network
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Limites de ressources (ajuste selon tes besoins)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Labels pour traefik (si utilisé)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portail-docs.rule=Host(`docs.monentreprise.com`)"
      - "traefik.http.routers.portail-docs.entrypoints=websecure"
      - "traefik.http.routers.portail-docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.portail-docs.loadbalancer.server.port=80"

  # ─────────────────────────────────────────────────────────────────────────
  # Wiki.js (Optionnel - Si tu veux aussi conteneuriser Wiki.js)
  # ─────────────────────────────────────────────────────────────────────────
  wikijs:
    container_name: wikijs
    image: ghcr.io/requarks/wiki:2
    restart: unless-stopped
    
    # Ports exposés
    ports:
      - "3000:3000"
    
    # Variables d'environnement Wiki.js
    environment:
      DB_TYPE: postgres
      DB_HOST: wikijs-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-wikijs}
      DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: ${POSTGRES_DB:-wikijs}
    
    # Volumes
    volumes:
      - wikijs-data:/wiki/data
    
    # Dépend de la base de données
    depends_on:
      wikijs-db:
        condition: service_healthy
    
    # Réseaux
    networks:
      - portail-network
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL pour Wiki.js (Optionnel)
  # ─────────────────────────────────────────────────────────────────────────
  wikijs-db:
    container_name: wikijs-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    
    # Variables d'environnement PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikijs}
      POSTGRES_USER: ${POSTGRES_USER:-wikijs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    
    # Volumes pour persistance
    volumes:
      - wikijs-db-data:/var/lib/postgresql/data
    
    # Réseaux
    networks:
      - portail-network
    
    # Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikijs}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  portail-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ═══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════

volumes:
  # Données Wiki.js
  wikijs-data:
    driver: local
  
  # Base de données PostgreSQL
  wikijs-db-data:
    driver: local
