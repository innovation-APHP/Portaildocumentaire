# ============================================================================
# docker-compose.yml - Portail Documentaire avec PostgreSQL
# Configuration complète pour déploiement production
# ============================================================================

version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════
# SERVICES
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    container_name: portail-postgres
    image: postgres:15-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portail_docs}
      POSTGRES_USER: ${POSTGRES_USER:-portail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portail_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - portail-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portail_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Backend API (Node.js + Express)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    container_name: portail-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portail_user}:${POSTGRES_PASSWORD:-portail_password_change_me}@postgres:5432/${POSTGRES_DB:-portail_docs}
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760

    volumes:
      - uploads-data:/app/uploads

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - portail-network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend (Application React + Nginx)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    container_name: portail-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
        VITE_RAG_API_URL: ${VITE_RAG_API_URL:-}
    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      - TZ=Europe/Paris

    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - portail-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  portail-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ═══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════

volumes:
  postgres-data:
    driver: local

  uploads-data:
    driver: local
