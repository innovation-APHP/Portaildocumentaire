# ============================================================================
# Configuration Nginx pour le Portail Documentaire
# Optimisée pour production avec cache et compression
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    
    server_name _;
    
    # Root et index
    root /usr/share/nginx/html;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # ═══════════════════════════════════════════════════════════════════════
    # Compression GZIP
    # ═══════════════════════════════════════════════════════════════════════
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    
    # ═══════════════════════════════════════════════════════════════════════
    # Headers de sécurité
    # ═══════════════════════════════════════════════════════════════════════
    
    # Protection XSS
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Empêche le clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Content Type Sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (ajuste selon tes besoins)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
    
    # ═══════════════════════════════════════════════════════════════════════
    # Gestion du routing React (SPA)
    # ═══════════════════════════════════════════════════════════════════════
    
    location / {
        try_files $uri $uri/ /index.html;
        
        # Headers pour le HTML
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    
    # ═══════════════════════════════════════════════════════════════════════
    # Cache des assets statiques
    # ═══════════════════════════════════════════════════════════════════════
    
    # JavaScript et CSS (avec hash dans le nom de fichier)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Images
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Fonts
    location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # CORS pour les fonts si nécessaire
        add_header Access-Control-Allow-Origin "*";
    }
    
    # Fichiers JSON et XML
    location ~* \.(?:json|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
    
    # ═══════════════════════════════════════════════════════════════════════
    # Fichiers spéciaux
    # ═══════════════════════════════════════════════════════════════════════
    
    # favicon.ico
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
    }
    
    # robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # ═══════════════════════════════════════════════════════════════════════
    # Sécurité : Bloquer les fichiers cachés
    # ═══════════════════════════════════════════════════════════════════════
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ═══════════════════════════════════════════════════════════════════════
    # Healthcheck endpoint
    # ═══════════════════════════════════════════════════════════════════════
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # ═══════════════════════════════════════════════════════════════════════
    # Timeouts et limites
    # ═══════════════════════════════════════════════════════════════════════
    
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
}
